<!DOCTYPE html>
<html lang="es">

<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <title>Login - Zara Clone</title>
</head>

<body>
    <div class="container">
        <div id="vista-bienvenida" class="vista active">
            <h2>Bienvenido</h2>
            <p>Gestión de Inventario</p>
            <div class="botones-inicio">
                <button class="btn-primary" onclick="mostrarVista('login')">Iniciar Sesión</button>
                <button class="btn-success" onclick="mostrarVista('registro')">Registrarse</button>
            </div>
        </div>

    <!-- Login -->
    <div id="vista-login" class="vista">
        <h2>Iniciar Sesión</h2>
        <div id="mensaje-login" class="mensaje"></div>
        <form onsubmit="login(event)">
            <div class="form-group">
                <label for="login-email">Correo Electrónico</label>
                <input type="email" id="login-email" required>
            </div>
            <div class="form-group">
                <label for="login-password">Contraseña</label>
                <input type="password" id="login-password" required>
            </div>
            <button type="submit" class="btn-primary">Iniciar Sesión</button>
            <button type="button" class="btn-secondary" onclick="mostrarVista('bienvenida')">Volver</button>
        </form>
        <div class="link">
            ¿No tienes cuenta? <a onclick="mostrarVista('registro')">Regístrate aquí</a>
        </div>
    </div>

    <!-- Registro -->
    <div id="vista-registro" class="vista">
        <h2>Registro</h2>
        <div id="mensaje-registro" class="mensaje"></div>
        <form onsubmit="registro(event)">
            <div class="form-group">
                <label for="registro-nombre">Nombre Completo</label>
                <input type="text" id="registro-nombre" required>
            </div>
            <div class="form-group">
                <label for="registro-email">Correo Electrónico</label>
                <input type="email" id="registro-email" required>
            </div>
            <div class="form-group">
                <label for="registro-password">Contraseña</label>
                <input type="password" id="registro-password" required minlength="6">
            </div>
            <button type="submit" class="btn-success">Registrarse</button>
            <button type="button" class="btn-secondary" onclick="mostrarVista('bienvenida')">Volver</button>
        </form>
        <div class="link">
            ¿Ya tienes cuenta? <a onclick="mostrarVista('login')">Inicia sesión aquí</a>
        </div>
    </div>
    </div>

    <script src="registro.js"></script>
</body>

</html>
